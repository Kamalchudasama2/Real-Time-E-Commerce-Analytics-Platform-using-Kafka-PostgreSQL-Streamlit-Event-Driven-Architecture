<!DOCTYPE html>
<html>
<head>

    <title>Place Order</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">

            Place Order

        </h2>

        <form action="/submit-order" method="POST">

            <input
                type="hidden"
                name="product"
                value="{{ product }}">

            <input
                type="hidden"
                name="price"
                value="{{ price }}">

            <div class="mb-3">

                <label class="form-label">

                    Customer Name

                </label>

                <input
                    type="text"
                    name="customer_name"
                    class="form-control"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Product

                </label>

                <input
                    class="form-control"
                    value="{{ product }}"
                    readonly>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Price

                </label>

                <input
                    class="form-control"
                    value="₹{{ price }}"
                    readonly>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Quantity

                </label>

                <input
                    type="number"
                    name="quantity"
                    min="1"
                    value="1"
                    class="form-control"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    City

                </label>

                <select
                    name="city"
                    class="form-select">

                    <option>Bangalore</option>
                    <option>Mumbai</option>
                    <option>Delhi</option>
                    <option>Chennai</option>
                    <option>Hyderabad</option>

                </select>

            </div>

            <button
                class="btn btn-success w-100">

                Place Order

            </button>

        </form>

    </div>

</div>

</body>
</html>
